<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PiK.PiK — Pure Lime Icons</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #E30B5D; 
            --accent: #BFFF00; /* Тот самый салатовый */
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
            margin: 0; padding: 0;
            padding-bottom: 160px;
            overflow-x: hidden;
        }

        /* КНОПКА МЕНЮ (Три полоски) */
        .burger-btn {
            position: absolute;
            left: 25px; top: 60px;
            display: flex; flex-direction: column; gap: 6px;
            cursor: pointer; z-index: 2001;
        }

        /* Делаем полоски меню салатовыми и светящимися */
        .burger-btn span {
            width: 28px; height: 3px;
            background: var(--accent);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(191,255,0,0.5);
        }

        .header {
            padding: 50px 20px 20px;
            display: flex; justify-content: center; align-items: center; position: relative;
        }

        .site-logo {
            width: 170px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        /* СКРЫТОЕ БОКОВОЕ МЕНЮ (ЗЕРКАЛЬНОЕ) */
        .side-menu {
            position: fixed; left: -100%; top: 0; width: 75%; height: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            z-index: 3000;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255, 255, 255, 0.3);
            display: flex; flex-direction: column; padding: 100px 30px; box-sizing: border-box;
        }

        .side-menu.open {
            left: 0;
            box-shadow: 20px 0 50px rgba(0,0,0,0.3);
        }

        /* САЛАТОВЫЕ ИКОНКИ В БОКОВОМ МЕНЮ */
        .menu-item {
            color: #fff;
            text-decoration: none; font-size: 20px; font-weight: 700;
            margin-bottom: 30px;
            display: flex; align-items: center; gap: 18px;
        }

        /* Покрасили иконку в салатовый */
        .menu-item i {
            color: var(--accent);
            font-size: 22px;
            width: 25px; text-align: center;
        }

        /* ЗАТЕМНЕНИЕ */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 2500;
        }
        .overlay.active { display: block; }

        /* КАРТОЧКИ ФИЛЬМОВ */
        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .movie-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px); border-radius: 30px; padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4); text-align: center;
        }

        /* САЛАТОВАЯ ИКОНКА "КИНО" (Вместо эмодзи 🎬) */
        .poster-placeholder {
            width: 100%; aspect-ratio: 2/3;
            background: rgba(0,0,0,0.15); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }

        .poster-placeholder i {
            color: var(--accent);
            font-size: 45px;
        }

        /* САЛАТОВЫЕ ГЛЯНЦЕВЫЕ КНОПКИ */
        .play-btn {
            background: linear-gradient(180deg, #DFFF4F 0%, #BFFF00 50%, #A6E200 100%);
            color: #000; border: none; width: 100%; padding: 14px;
            border-radius: 18px; font-weight: 900;
            box-shadow: 0 8px 20px rgba(191,255,0,0.4), inset 0 2px 4px #fff;
        }

        /* ЗЕРКАЛЬНОЕ НИЖНЕЕ МЕНЮ (ОСТРОВ) */
        .bottom-nav {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(20px); border-radius: 45px;
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            display: flex; justify-content: space-around; padding: 18px 5px; z-index: 2000;
        }

        .nav-item { 
            text-decoration: none; color: #fff; font-size: 11px; 
            display: flex; flex-direction: column; align-items: center; gap: 7px; opacity: 0.7; 
        }

        /* САЛАТОВЫЕ ИКОНКИ В НИЖНЕМ МЕНЮ */
        .nav-item i {
            font-size: 24px;
            transition: 0.3s;
        }

        /* АКТИВНЫЙ ПУНКТ — СВЕТИТСЯ САЛАТОВЫМ */
        .nav-item.active { 
            opacity: 1; color: var(--accent); 
        }
        .nav-item.active i {
            color: var(--accent);
            filter: drop-shadow(0 0 5px var(--accent));
        }

    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<nav id="side-menu" class="side-menu">
    <a href="#" class="menu-item"><i class="fas fa-user-circle"></i> Profile</a>
    <a href="#" class="menu-item"><i class="fas fa-star"></i> Favorites</a>
    <a href="#" class="menu-item"><i class="fas fa-gem"></i> Premium</a>
    <a href="#" class="menu-item"><i class="fas fa-cog"></i> Settings</a>
</nav>

<header class="header">
    <div class="burger-btn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
    <img src="978AC2CD-A8DC-4EC3-BAAD-002C6B62DF53.png" alt="PiK.PiK" class="site-logo">
</header>

<div class="movie-grid">
    <div class="movie-card">
        <div class="poster-placeholder"><i class="fas fa-clapperboard"></i></div>
        <div style="margin-bottom:12px; font-weight:700;">Inside Out 2</div>
        <button class="play-btn">WATCH NOW</button>
    </div>
    <div class="movie-card">
        <div class="poster-placeholder"><i class="fas fa-clapperboard"></i></div>
        <div style="margin-bottom:12px; font-weight:700;">Deadpool 3</div>
        <button class="play-btn">WATCH NOW</button>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="#" class="nav-item"><i class="fas fa-fire"></i><span>Trends</span></a>
    <a href="#" class="nav-item"><i class="fas fa-book-open"></i><span>Library</span></a>
</nav>

<script>
    function toggleMenu() {
        document.getElementById('side-menu').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }
</script>

</body>
</html>
