<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PiK.PiK — Pure Look</title>
    <style>
        :root {
            --bg-color: #E30B5D; 
            --accent: #BFFF00;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #ff1a75, #E30B5D); /* Сочный градиент на фоне */
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
            margin: 0; padding: 0;
            padding-bottom: 140px;
        }

        .header {
            padding: 60px 20px 20px;
            display: flex;
            justify-content: center;
        }

        .site-logo {
            width: 190px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        /* ЗЕРКАЛЬНОЕ СТЕКЛО (Card) */
        .movie-card {
            background: rgba(255, 255, 255, 0.15); /* Прозрачность выше */
            backdrop-filter: blur(10px) saturate(180%); /* Чистое размытие */
            -webkit-backdrop-filter: blur(10px) saturate(180%);
            border-radius: 30px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4); /* Яркая тонкая грань */
            box-shadow: 0 15px 35px rgba(0,0,0,0.2), inset 0 2px 10px rgba(255,255,255,0.3);
            text-align: center;
        }

        .movie-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; padding: 20px;
        }

        .poster-placeholder {
            width: 100%; aspect-ratio: 2/3;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* СОЧНЫЕ ГЛЯНЦЕВЫЕ КНОПКИ */
        .play-btn {
            background: linear-gradient(180deg, #DFFF4F 0%, #BFFF00 50%, #A6E200 100%);
            color: #000; border: none; width: 100%; padding: 14px;
            border-radius: 18px; font-weight: 900; font-size: 12px;
            text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(191,255,0,0.4), inset 0 2px 4px #fff;
            cursor: pointer;
            transition: 0.2s;
        }

        .play-btn:active { transform: scale(0.95); }

        /* ЗЕРКАЛЬНЫЙ ОСТРОВ (Bottom Nav) */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            width: 88%; 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            display: flex; justify-content: space-around;
            padding: 15px 5px; border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5); /* Зеркальный блеск */
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            z-index: 9999;
        }

        .nav-item { 
            text-decoration: none; color: #fff; font-size: 11px; 
            display: flex; flex-direction: column; align-items: center; gap: 5px; opacity: 0.6;
        }

        .nav-item.active { opacity: 1; color: var(--accent); filter: drop-shadow(0 0 5px var(--accent)); }
        .nav-icon { font-size: 22px; }

    </style>
</head>
<body>

<header class="header">
    <img src="978AC2CD-A8DC-4EC3-BAAD-002C6B62DF53.png" alt="PiK.PiK" class="site-logo">
</header>

<div class="movie-grid">
    <div class="movie-card">
        <div class="poster-placeholder">🎬</div>
        <div style="margin-bottom:12px; font-weight:700;">Inside Out 2</div>
        <button class="play-btn">WATCH NOW</button>
    </div>
    <div class="movie-card">
        <div class="poster-placeholder">🎬</div>
        <div style="margin-bottom:12px; font-weight:700;">Deadpool 3</div>
        <button class="play-btn">WATCH NOW</button>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a href="#" class="nav-item"><span class="nav-icon">🔥</span><span>Trends</span></a>
    <a href="#" class="nav-item"><span class="nav-icon">📚</span><span>Library</span></a>
</nav>

</body>
</html>
