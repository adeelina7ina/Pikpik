<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PikPik — Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* ГЛАВНЫЙ ЭКРАН (НЕ ПЕРЕНОСИМ, ЧТОБЫ НЕ СЛОМАТЬ) */
        * { font-family: -apple-system, BlinkMacSystemFont, sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --bg-color: #E30B5D; --accent: #BFFF00; --glass: rgba(255, 255, 255, 0.15); }
        body { background-color: var(--bg-color); color: #fff; margin: 0; padding-bottom: 160px; overflow-x: hidden; }

        .main-header {
            padding: 55px 20px 15px; display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background-color: var(--bg-color);
        }
        .logo-container img { height: 35px; }
        .sign-in-btn { background: var(--accent); color: #000; border: none; padding: 8px 18px; border-radius: 20px; font-weight: 900; font-size: 11px; text-transform: uppercase; }

        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px 20px; margin-top: 130px; }
        .movie-card { background: var(--glass); border-radius: 30px; padding: 15px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; transition: 0.3s; }
        .poster-area { width: 100%; aspect-ratio: 2/3; background: rgba(0,0,0,0.2); border-radius: 22px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; color: var(--accent); font-size: 40px; }
        .play-btn-fixed { background: var(--accent); color: #000; border: none; width: 100%; padding: 14px; border-radius: 18px; font-weight: 900; font-size: 11px; text-transform: uppercase; cursor: pointer; }

        .bottom-nav-fixed { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 88%; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px); border-radius: 100px; display: flex; justify-content: space-around; padding: 18px 0; border: 1px solid rgba(255, 255, 255, 0.2); z-index: 999; }
        .nav-item { color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 6px; opacity: 0.6; cursor: pointer; }
        .nav-item i { font-size: 26px; }
        .nav-item.active { opacity: 1; color: var(--accent); }

        .burger-btn { display: flex; flex-direction: column; gap: 5px; width: 22px; cursor: pointer; }
        .burger-btn span { display: block; width: 100%; height: 3px; background: #fff; border-radius: 10px; }
    </style>
</head>
<body>

<div class="side-menu-island" id="sideMenu">
    <nav class="menu-nav">
        <a href="#" data-filter="all"><i class="fas fa-layer-group"></i>Categories</a>
        <a href="#" data-filter="movie"><i class="fas fa-ticket"></i>Movies</a>
        <a href="#" data-filter="tv"><i class="fas fa-tv"></i>TV Series</a>
        <a href="#" data-filter="all"><i class="fas fa-fire"></i>New</a>
        <a href="#" data-filter="all"><i class="fas fa-star"></i>Watchlist</a>
        <a href="#"><i class="fas fa-gear"></i>Settings</a>
    </nav>
</div>

<header class="main-header">
    <div class="burger-btn" id="openBtn"><span></span><span></span><span></span></div>
    <div class="logo-container"><img src="10643A89-D363-4E58-8E4E-EF64184C9075.png"></div>
    <button class="sign-in-btn">SIGN IN</button>
</header>

<div class="movie-grid" id="movieGrid">
    <div class="movie-card" data-type="movie">
        <div class="poster-area"><i class="fas fa-play"></i></div>
        <div style="font-size: 13px; font-weight: 800; margin-bottom: 12px;">Inside Out 2</div>
        <button class="play-btn-fixed">WATCH NOW</button>
    </div>
    <div class="movie-card" data-type="movie">
        <div class="poster-area"><i class="fas fa-play"></i></div>
        <div style="font-size: 13px; font-weight: 800; margin-bottom: 12px;">Deadpool 3</div>
        <button class="play-btn-fixed">WATCH NOW</button>
    </div>
    <div class="movie-card" data-type="tv">
        <div class="poster-area"><i class="fas fa-play"></i></div>
        <div style="font-size: 13px; font-weight: 800; margin-bottom: 12px;">Dune: Part 2</div>
        <button class="play-btn-fixed">WATCH NOW</button>
    </div>
    <div class="movie-card" data-type="tv">
        <div class="poster-area"><i class="fas fa-play"></i></div>
        <div style="font-size: 13px; font-weight: 800; margin-bottom: 12px;">Furiosa</div>
        <button class="play-btn-fixed">WATCH NOW</button>
    </div>
</div>

<nav class="bottom-nav-fixed">
    <a href="#" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="#" class="nav-item"><i class="fas fa-fire-alt"></i><span>Trends</span></a>
    <a href="#" class="nav-item"><i class="fas fa-bookmark"></i><span>Saved</span></a>
</nav>

<script>
    const sideMenu = document.getElementById('sideMenu');
    const movieCards = document.querySelectorAll('.movie-card');
    const menuLinks = document.querySelectorAll('.menu-nav a');
    const navItems = document.querySelectorAll('.nav-item');

    // 1. Открытие меню
    document.getElementById('openBtn').onclick = (e) => {
        e.stopPropagation();
        sideMenu.classList.toggle('active');
    };

    // 2. Логика фильтрации (Работа кнопок в меню)
    menuLinks.forEach(link => {
        link.onclick = (e) => {
            const filter = link.getAttribute('data-filter');
            if(!filter) return;

            movieCards.forEach(card => {
                if (filter === 'all' || card.getAttribute('data-type') === filter) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
            sideMenu.classList.remove('active');
        };
    });

    // 3. Работа нижних кнопок (таббара)
    navItems.forEach(item => {
        item.onclick = () => {
            navItems.forEach(i => i.classList.remove('active'));
            item.classList.add('active');
        };
    });

    // Закрытие при клике по экрану
    window.onclick = (e) => {
        if (!e.target.closest('.side-menu-island')) sideMenu.classList.remove('active');
    };
</script>

</body>
</html>
