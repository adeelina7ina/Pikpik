<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PiK.PiK — Raspberry Header</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #E30B5D; 
            --accent: #BFFF00;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
            margin: 0; padding: 0;
            padding-bottom: 140px;
        }

        /* МАЛИНОВАЯ ШАПКА В ОДНУ ЛИНИЮ */
        .main-header {
            padding: 50px 15px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-color);
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 9999;
            box-sizing: border-box;
        }

        /* Салатовое бургер-меню */
        .burger-btn {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }
        .burger-btn span {
            width: 25px; height: 3px;
            background: var(--accent); /* Салатовые полоски */
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(191,255,0,0.4);
        }

        /* ЛОГОТИП В ДЛИНУ */
        .logo-long {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Verdana', sans-serif;
            font-weight: 900;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .logo-part {
            position: relative;
            color: #fff;
        }

        /* Тот самый квадратик над i */
        .logo-part::after {
            content: '';
            position: absolute;
            top: -4px; right: 0px;
            width: 7px; height: 7px;
            background-color: var(--accent);
            border-radius: 1px;
        }

        /* КНОПКА SIGN IN (ЛАЙМОВАЯ) */
        .sign-in-btn {
            background: linear-gradient(180deg, #DFFF4F 0%, #BFFF00 50%, #A6E200 100%);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-family: 'Verdana', sans-serif;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(191,255,0,0.3), inset 0 2px 3px #fff;
        }

        /* СЕТКА ФИЛЬМОВ */
        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; padding-top: 120px; }
        .movie-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px); border-radius: 30px; padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4); text-align: center;
        }
        .poster-placeholder {
            width: 100%; aspect-ratio: 2/3;
            background: rgba(0,0,0,0.1); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
        }
        .poster-placeholder i { color: var(--accent); font-size: 40px; }
        .play-btn {
            background: linear-gradient(180deg, #DFFF4F 0%, #BFFF00 50%, #A6E200 100%);
            color: #000; border: none; width: 100%; padding: 14px;
            border-radius: 18px; font-weight: 900;
        }

        /* НИЖНЯЯ НАВИГАЦИЯ */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(20px); border-radius: 40px;
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            display: flex; justify-content: space-around; padding: 15px 5px; z-index: 2000;
        }
        .nav-item { color: #fff; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 5px; opacity: 0.7; }
        .nav-item.active { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

<header class="main-header">
    <div class="burger-btn">
        <span></span><span></span><span></span>
    </div>

    <div class="logo-long">
        <span class="logo-part">PiK</span>
        <span class="logo-part">PiK</span>
    </div>

    <button class="sign-in-btn">SIGN IN</button>
</header>

<div class="movie-grid">
    <div class="movie-card">
        <div class="poster-placeholder"><i class="fas fa-clapperboard"></i></div>
        <div style="margin-bottom:12px; font-weight:700;">Inside Out 2</div>
        <button class="play-btn">WATCH NOW</button>
    </div>
    <div class="movie-card">
        <div class="poster-placeholder"><i class="fas fa-clapperboard"></i></div>
        <div style="margin-bottom:12px; font-weight:700;">Deadpool 3</div>
        <button class="play-btn">WATCH NOW</button>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="#" class="nav-item"><i class="fas fa-fire"></i><span>Trends</span></a>
    <a href="#" class="nav-item"><i class="fas fa-book-open"></i><span>Library</span></a>
</nav>

</body>
</html>
