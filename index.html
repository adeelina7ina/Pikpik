<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PikPik — Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        /* БАЗОВЫЕ СТИЛИ (ЗАМОРОЖЕНО) */
        * { font-family: -apple-system, sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --bg-color: #E30B5D; --accent: #BFFF00; --glass: rgba(255, 255, 255, 0.15); }
        body { background-color: var(--bg-color); color: #fff; margin: 0; padding-bottom: 160px; overflow-x: hidden; }

        .main-header { padding: 55px 20px 15px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background-color: var(--bg-color); }
        .logo-container img { height: 35px; }
        .sign-in-btn { background: var(--accent); color: #000; border: none; padding: 8px 18px; border-radius: 20px; font-weight: 900; font-size: 11px; text-transform: uppercase; }

        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px 20px; margin-top: 130px; }
        .movie-card { background: var(--glass); border-radius: 30px; padding: 15px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; position: relative; }
        .poster-area { width: 100%; aspect-ratio: 2/3; background: rgba(0,0,0,0.2); border-radius: 22px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; color: var(--accent); font-size: 40px; }
        .play-btn-fixed { background: var(--accent); color: #000; border: none; width: 100%; padding: 14px; border-radius: 18px; font-weight: 900; font-size: 11px; text-transform: uppercase; }

        /* ИКОНКА СЕРДЕЧКА ДЛЯ WATCHLIST */
        .fav-btn { position: absolute; top: 25px; right: 25px; color: #fff; font-size: 20px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .fav-btn.active { color: var(--accent); }

        /* ОКНО НАСТРОЕК */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #780a2d; width: 80%; padding: 30px; border-radius: 40px; text-align: center; border: 1px solid var(--glass); }
        .modal-content h2 { font-weight: 900; text-transform: uppercase; font-size: 18px; margin-bottom: 20px; }
        .close-modal { background: var(--accent); color: #000; border: none; padding: 10px 25px; border-radius: 15px; font-weight: 800; margin-top: 20px; }

        .bottom-nav-fixed { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 88%; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px); border-radius: 100px; display: flex; justify-content: space-around; padding: 18px 0; border: 1px solid rgba(255, 255, 255, 0.2); z-index: 999; }
        .nav-item { color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 6px; opacity: 0.6; }
        .nav-item i { font-size: 26px; }
        .nav-item.active { opacity: 1; color: var(--accent); }
        .burger-btn { display: flex; flex-direction: column; gap: 5px; width: 22px; cursor: pointer; }
        .burger-btn span { display: block; width: 100%; height: 3px; background: #fff; border-radius: 10px; }
    </style>
</head>
<body>

<div class="side-menu-island" id="sideMenu">
    <nav class="menu-nav">
        <a href="#" onclick="filterMovies('all')"><i class="fas fa-layer-group"></i>Categories</a>
        <a href="#" onclick="filterMovies('movie')"><i class="fas fa-ticket"></i>Movies</a>
        <a href="#" onclick="filterMovies('tv')"><i class="fas fa-tv"></i>TV Series</a>
        <a href="#" onclick="showWatchlist()"><i class="fas fa-star"></i>Watchlist</a>
        <a href="#" onclick="openSettings()"><i class="fas fa-gear"></i>Settings</a>
    </nav>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h2>Settings</h2>
        <p style="opacity: 0.7; font-size: 14px;">Dark Mode: ON</p>
        <p style="opacity: 0.7; font-size: 14px;">Language: English</p>
        <button class="close-modal" onclick="closeSettings()">CLOSE</button>
    </div>
</div>

<header class="main-header">
    <div class="burger-btn" id="openBtn"><span></span><span></span><span></span></div>
    <div class="logo-container"><img src="10643A89-D363-4E58-8E4E-EF64184C9075.png"></div>
    <button class="sign-in-btn">SIGN IN</button>
</header>

<div class="movie-grid" id="movieGrid">
    <div class="movie-card" data-type="movie">
        <i class="fas fa-heart fav-btn" onclick="toggleFav(this)"></i>
        <div class="poster-area"><i class="fas fa-play"></i></div>
        <div style="font-size: 13px; font-weight: 800; margin-bottom: 12px;">Inside Out 2</div>
        <button class="play-btn-fixed">WATCH NOW</button>
    </div>
    <div class="movie-card" data-type="movie">
        <i class="fas fa-heart fav-btn" onclick="toggleFav(this)"></i>
        <div class="poster-area"><i class="fas fa-play"></i></div>
        <div style="font-size: 13px; font-weight: 800; margin-bottom: 12px;">Deadpool 3</div>
        <button class="play-btn-fixed">WATCH NOW</button>
    </div>
    <div class="movie-card" data-type="tv">
        <i class="fas fa-heart fav-btn" onclick="toggleFav(this)"></i>
        <div class="poster-area"><i class="fas fa-play"></i></div>
        <div style="font-size: 13px; font-weight: 800; margin-bottom: 12px;">Dune: Part 2</div>
        <button class="play-btn-fixed">WATCH NOW</button>
    </div>
    <div class="movie-card" data-type="tv">
        <i class="fas fa-heart fav-btn" onclick="toggleFav(this)"></i>
        <div class="poster-area"><i class="fas fa-play"></i></div>
        <div style="font-size: 13px; font-weight: 800; margin-bottom: 12px;">Furiosa</div>
        <button class="play-btn-fixed">WATCH NOW</button>
    </div>
</div>

<nav class="bottom-nav-fixed">
    <a href="#" class="nav-item active" onclick="filterMovies('all')"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="#" class="nav-item"><i class="fas fa-fire-alt"></i><span>Trends</span></a>
    <a href="#" class="nav-item" onclick="showWatchlist()"><i class="fas fa-bookmark"></i><span>Saved</span></a>
</nav>

<script>
    const sideMenu = document.getElementById('sideMenu');
    
    // ОТКРЫТЬ МЕНЮ
    document.getElementById('openBtn').onclick = (e) => { e.stopPropagation(); sideMenu.classList.toggle('active'); };

    // ФУНКЦИЯ ФИЛЬТРАЦИИ
    function filterMovies(type) {
        const cards = document.querySelectorAll('.movie-card');
        cards.forEach(card => {
            card.style.display = (type === 'all' || card.dataset.type === type) ? 'block' : 'none';
        });
        sideMenu.classList.remove('active');
    }

    // WATCHLIST (СЕРДЕЧКИ)
    function toggleFav(btn) {
        btn.classList.toggle('active');
    }

    function showWatchlist() {
        const cards = document.querySelectorAll('.movie-card');
        cards.forEach(card => {
            const isFav = card.querySelector('.fav-btn').classList.contains('active');
            card.style.display = isFav ? 'block' : 'none';
        });
        sideMenu.classList.remove('active');
    }

    // SETTINGS (МОДАЛКА)
    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; sideMenu.classList.remove('active'); }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

    window.onclick = (e) => { if (!e.target.closest('.side-menu-island')) sideMenu.classList.remove('active'); };
</script>

</body>
</html>
