<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PiK.PiK — Clean Design</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ОДИН ШРИФТ ДЛЯ ВСЕГО САЙТА */
        * {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #E30B5D; /* Мягкий малиновый */
            --accent: #BFFF00;   /* Лаймовый */
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            margin: 0; padding: 0;
            padding-bottom: 140px;
            overflow-x: hidden;
        }

        /* ШАПКА: БУРГЕР - ЛОГО - КНОПКА */
        .main-header {
            padding: 55px 20px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-color);
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 10000;
        }

        .burger-btn {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 25px;
            cursor: pointer;
        }
        .burger-btn span {
            width: 100%; height: 2.5px;
            background: #fff;
            border-radius: 10px;
        }

        /* МЕСТО ДЛЯ ТВОЕГО ЛОГОТИПА (ПО ЦЕНТРУ) */
        .logo-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Когда будешь вставлять картинку, замени текст ниже на <img src="твой_файл.png"> */
        .logo-placeholder {
            font-weight: 900;
            font-size: 22px;
            letter-spacing: -1px;
            text-transform: uppercase;
            color: #fff;
        }

        /* КНОПКА SIGN IN (ЛАЙМОВАЯ) */
        .sign-in-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* КАРТОЧКИ ФИЛЬМОВ (МАТОВОЕ СТЕКЛО) */
        .movie-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 130px 20px 20px; 
        }
        
        .movie-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .poster-area {
            width: 100%; aspect-ratio: 2/3;
            background: rgba(0,0,0,0.1);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }
        .poster-area i { color: var(--accent); font-size: 35px; opacity: 0.8; }

        .play-btn {
            background: var(--accent);
            color: #000; border: none; width: 100%; padding: 12px;
            border-radius: 15px; font-weight: 800; font-size: 11px;
        }

        /* НИЖНЕЕ МЕНЮ */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(20px); border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; justify-content: space-around; padding: 12px 0;
            z-index: 9999;
        }
        .nav-item { color: #fff; text-decoration: none; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.6; }
        .nav-item.active { opacity: 1; color: var(--accent); }
        .nav-item i { font-size: 20px; }
    </style>
</head>
<body>

<header class="main-header">
    <div class="burger-btn">
        <span></span><span></span><span></span>
    </div>

    <div class="logo-container">
        <div class="logo-placeholder">PiK PiK</div>
    </div>

    <button class="sign-in-btn">SIGN IN</button>
</header>

<div class="movie-grid">
    <div class="movie-card">
        <div class="poster-area"><i class="fas fa-clapperboard"></i></div>
        <div style="font-size: 13px; font-weight: 700; margin-bottom: 10px;">Inside Out 2</div>
        <button class="play-btn">WATCH NOW</button>
    </div>
    <div class="movie-card">
        <div class="poster-area"><i class="fas fa-clapperboard"></i></div>
        <div style="font-size: 13px; font-weight: 700; margin-bottom: 10px;">Deadpool 3</div>
        <button class="play-btn">WATCH NOW</button>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="#" class="nav-item"><i class="fas fa-fire"></i><span>Trends</span></a>
    <a href="#" class="nav-item"><i class="fas fa-book-open"></i><span>Library</span></a>
</nav>

</body>
</html>
