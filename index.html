<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PiK.PiK — Pure Look</title>
    <style>
        :root {
            --bg-color: #E30B5D; /* Твой фирменный цвет */
            --accent: #BFFF00;   /* Салатовый */
            --nav-bg: rgba(138, 6, 58, 0.95);
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
            margin: 0; padding: 0;
            padding-bottom: 120px; /* Большой отступ снизу */
            overflow-x: hidden;
        }

        /* КОМПАКТНАЯ И БЕЗОПАСНАЯ ШАПКА */
        .main-header {
            padding: 50px 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Большой логотип, как ты хотела */
        .site-logo {
            width: 180px;
            height: auto;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.3));
        }

        .profile-circle {
            position: absolute;
            right: 20px;
            top: 55px;
            width: 38px; height: 38px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        /* ЧЕТКАЯ ПОИСКОВАЯ СТРОКА */
        .search-box { padding: 10px 20px; }
        .search-input {
            width: 100%; padding: 15px 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255, 255, 255, 0.1);
            outline: none; box-sizing: border-box; font-size: 16px;
            color: #fff;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.7); }

        /* ЧЕТКИЙ "ТРЕНД" ЗАГОЛОВОК */
        .section-title { padding: 25px 25px 10px; font-weight: 700; font-size: 20px; letter-spacing: 1px;}

        /* СЕТКА ФИЛЬМОВ (ОТСТУП СНИЗУ) */
        .movie-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; padding: 10px 20px;
            margin-bottom: 20px; /* Отступ от навигации */
        }

        .movie-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 12px;
            text-align: center;
        }

        .poster-placeholder {
            width: 100%; aspect-ratio: 2/3;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; margin-bottom: 12px;
        }

        .movie-title { font-size: 15px; font-weight: 600; margin: 0 0 10px; }

        .play-btn {
            background: var(--accent); color: #000;
            border: none; width: 100%; padding: 12px;
            border-radius: 16px; font-weight: 800;
            font-size: 12px; text-transform: uppercase;
        }

        /* БЕЗОПАСНАЯ И ЧЕТКАЯ НИЖНЯЯ НАВИГАЦИЯ */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            display: flex; justify-content: space-around;
            padding: 15px 0 35px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 2000;
        }

        .nav-item { 
            color: #fff; text-decoration: none; font-size: 11px; 
            opacity: 0.5; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }

        .nav-icon { font-size: 20px; }
        .nav-item.active { color: var(--accent); opacity: 1; }

    </style>
</head>
<body>

<header class="main-header">
    <img src="978AC2CD-A8DC-4EC3-BAAD-002C6B62DF53.png" alt="PiK.PiK" class="site-logo">
    <div class="profile-circle">👤</div>
</header>

<div class="search-box">
    <input type="text" class="search-input" placeholder="Search your favorite movie...">
</div>

<div class="section-title">Trending Now</div>

<div class="movie-grid">
    <div class="movie-card">
        <div class="poster-placeholder">🎬</div>
        <h3 class="movie-title">Inside Out 2</h3>
        <button class="play-btn">WATCH NOW</button>
    </div>
    <div class="movie-card">
        <div class="poster-placeholder">🎬</div>
        <h3 class="movie-title">Deadpool 3</h3>
        <button class="play-btn">WATCH NOW</button>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active">
        <span class="nav-icon">🏠</span>
        <span>Home</span>
    </a>
    <a href="#" class="nav-item">
        <span class="nav-icon">🔥</span>
        <span>Trends</span>
    </a>
    <a href="#" class="nav-item">
        <span class="nav-icon">📚</span>
        <span>Library</span>
    </a>
</nav>

</body>
</html>
