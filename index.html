<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PiKPiK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --bg-color: #E30B5D; --accent: #BFFF00; --glass: rgba(255, 255, 255, 0.15); }
        
        body { background-color: var(--bg-color); color: #fff; margin: 0; padding-bottom: 150px; }

        /* HEADER */
        .main-header { padding: 55px 20px 15px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background: var(--bg-color); }
        .logo-img { height: 32px; width: auto; }

        .burger-btn { display: flex; flex-direction: column; gap: 5px; width: 22px; cursor: pointer; border: none; background: none; outline: none; }
        .burger-btn span { display: block; width: 100%; height: 3px; background: #fff; border-radius: 10px; }
        .burger-btn span:nth-child(2) { width: 65%; }

        .auth-btn { background: var(--accent); color: #000; border: none; padding: 10px 18px; border-radius: 25px; font-weight: 900; font-size: 13px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .verify-badge { color: #42a5f5; font-size: 14px; }

        /* GRID */
        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; margin-top: 110px; }
        .movie-card { background: var(--glass); border-radius: 35px; padding: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        
        .poster-area { width: 100%; aspect-ratio: 1/1.4; background: rgba(0,0,0,0.1); border-radius: 28px; margin-bottom: 10px; overflow: hidden; }
        .poster-area img { width: 100%; height: 100%; object-fit: cover; }

        .movie-title { font-weight: 800; font-size: 14px; margin-bottom: 12px; display: block; height: 34px; overflow: hidden; }
        .watch-btn { background: var(--accent); color: #000; border: none; width: 100%; padding: 12px; border-radius: 20px; font-weight: 900; font-size: 11px; text-transform: uppercase; }

        /* УВЕЛИЧЕННОЕ НИЖНЕЕ МЕНЮ */
        .bottom-nav { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(25px); 
            border-radius: 50px; 
            display: flex; 
            justify-content: space-around; 
            padding: 22px 0; /* Увеличила высоту здесь */
            border: 1px solid rgba(255,255,255,0.25); 
            z-index: 1000; 
        }
        .nav-item { 
            color: #fff; 
            text-decoration: none; 
            font-size: 13px; /* Текст крупнее */
            font-weight: 700; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
            opacity: 0.5; 
        }
        .nav-item.active { opacity: 1; color: var(--accent); }
        .nav-item i { font-size: 24px; /* Иконки крупнее */ }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #8a0c3b; width: 85%; padding: 30px; border-radius: 40px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .modal-input { width: 100%; background: rgba(0,0,0,0.2); color: #fff; border: none; padding: 16px; border-radius: 18px; margin-bottom: 12px; outline: none; }
    </style>
</head>
<body>

<header class="main-header">
    <button class="burger-btn" onclick="openMenu()"><span></span><span></span><span></span></button>
    <img src="10643A89-D363-4E58-8E4E-EF64184C9075.png" class="logo-img">
    <button class="auth-btn" onclick="toggleAuth()">
        <span id="btnText">Sign In</span>
        <i class="fas fa-check-circle verify-badge" id="badge" style="display:none"></i>
    </button>
</header>

<div class="movie-grid">
    <div class="movie-card"><div class="poster-area"><img src="https://image.tmdb.org/t/p/w500/vpnVM9B6NMmQpWeZvzLvRIoYzbQ.jpg"></div><span class="movie-title">Inside Out 2</span><button class="watch-btn">Watch Now</button></div>
    <div class="movie-card"><div class="poster-area"><img src="https://image.tmdb.org/t/p/w500/8Y43TsYvjUdtC2p3zJp9v07VpPL.jpg"></div><span class="movie-title">Deadpool 3</span><button class="watch-btn">Watch Now</button></div>
    <div class="movie-card"><div class="poster-area"><img src="https://image.tmdb.org/t/p/w500/n997U9p9W7Yf6Z86Ex96C9C9n9C.jpg"></div><span class="movie-title">Moana 2</span><button class="watch-btn">Watch Now</button></div>
    <div class="movie-card"><div class="poster-area"><img src="https://image.tmdb.org/t/p/w500/18wo7fS6pX2vI7S3D90yD9PzVpL.jpg"></div><span class="movie-title">Joker 2</span><button class="watch-btn">Watch Now</button></div>
</div>

<div class="modal" id="authModal">
    <div class="modal-content">
        <h2>Welcome</h2>
        <input type="text" id="nameInp" class="modal-input" placeholder="Your Name">
        <button class="watch-btn" style="font-size:16px" onclick="doLogin()">Login</button>
        <p onclick="closeModals()" style="margin-top:20px; cursor:pointer; opacity:0.5">CLOSE</p>
    </div>
</div>

<div class="modal" id="menuModal">
    <div class="modal-content">
        <h2>Menu</h2>
        <p>Settings • Profile • Search</p>
        <button class="watch-btn" onclick="closeModals()">Back</button>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="#" class="nav-item"><i class="fas fa-bolt"></i><span>Trends</span></a>
    <a href="#" class="nav-item"><i class="fas fa-bookmark"></i><span>Saved</span></a>
</nav>

<script>
    function openMenu() { document.getElementById('menuModal').style.display = 'flex'; }
    function closeModals() { 
        document.getElementById('authModal').style.display = 'none'; 
        document.getElementById('menuModal').style.display = 'none'; 
    }
    function toggleAuth() {
        const user = localStorage.getItem('pName');
        if(user) { localStorage.removeItem('pName'); location.reload(); }
        else { document.getElementById('authModal').style.display = 'flex'; }
    }
    function doLogin() {
        const name = document.getElementById('nameInp').value;
        if(name) { localStorage.setItem('pName', name); location.reload(); }
    }
    window.onload = () => {
        const savedName = localStorage.getItem('pName');
        if(savedName) {
            document.getElementById('btnText').innerText = savedName.toUpperCase();
            document.getElementById('badge').style.display = 'inline-block';
        }
    };
</script>

</body>
</html>
